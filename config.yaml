# 电子宠物提醒配置
# 路径：exe同级 data/config.yaml
# 首次运行时自动从模板释放

pet:
  name: "小新"
  style: "shinchan"
  default_animation: "cheer"

reminders:
  - name: "下班打卡"
    enabled: true
    time: "18:30"
    schedule_type: "daily"     # daily / workday / rest_day / once
    action_type: "open_url"
    action_target: "dingtalk://dingtalkclient/page/link?pc_slide=false&url=https://im.dingtalk.com/attendancemobile/index.html"
    animation: "cheer"
    message: "下班啦！快去打卡~"
    sound: true

  # --- 扩展示例（取消注释即可启用）---
  # - name: "晨间提醒"
  #   enabled: false
  #   time: "09:00"
  #   schedule_type: "workday"
  #   action_type: "notify_only"
  #   animation: "cheer"
  #   message: "早上好！开始工作吧~"
  #   sound: true

  # - id: "one-time-example"  # 一次性提醒必须有唯一 id
  #   name: "一次性提醒"
  #   enabled: false
  #   date: "2026-08-15"
  #   time: "09:00"
  #   schedule_type: "once"
  #   status: "pending"       # pending / completed / expired
  #   action_type: "play_animation"
  #   animation: "cheer"
  #   message: "一次性提醒时间到了~"
  #   sound: true

# --- 网络时间校准（二期）---
time_sync:
  enabled: true
  ntp_server: "ntp.aliyun.com"     # 阿里云NTP
  tolerance_seconds: 30            # 偏差告警阈值

# --- 天气信息（二期）---
weather:
  enabled: true
  city: "北京"
  api_provider: "openmeteo"        # openmeteo(免Key) / qweather / openweathermap
  api_key: ""                      # 和风天气/OpenWeatherMap需要填入Key
  update_interval_minutes: 60     # 同一城市天气缓存刷新间隔

# --- UI 配置 ---
ui:
  window_size: 256                 # 宠物窗口尺寸 (px)
  wander_speed_ms: 33              # 闲逛定时器间隔 (ms), ~30fps
  wander_x_range_ratio: 0.4        # X轴活动范围比例 (0~1)
  bubble_max_width: 300            # 提醒气泡最大宽度 (px)
  bubble_duration_ms: 8000         # 提醒气泡显示时长 (ms)
  weather_bubble_duration_ms: 6000 # 天气气泡显示时长 (ms)
  restore_quiet_delay_ms: 10000    # 提醒后恢复安静模式的延迟 (ms)

# --- 提醒引擎配置 ---
engine:
  check_interval_sec: 1            # 轮询检查间隔 (秒)
  sleep_grace_period_sec: 60       # 首次启动检查的宽容期 (秒)
  missed_reminder_retention_hours: 24 # 休眠唤醒后最多追溯时长 (小时)

# --- 日志配置 ---
logging:
  level: "INFO"                    # DEBUG / INFO / WARNING / ERROR
  file: "logs/pet.log"             # 日志文件路径（相对于 app_dir）

# --- 节假日手工覆盖（优先级高于内置日历）---
# 当前内置 2026 年中国大陆法定节假日与调休；未覆盖年份按周一至周五降级。
# 格式: "YYYY-MM-DD": true(调休上班) / false(法定假日)
# true = 虽然是周末但需要上班, false = 虽然是工作日但是假日
holidays: {}
  # 示例: 2026年元旦
  # "2026-01-01": false
  # 示例: 调休上班
  # "2026-01-04": true
